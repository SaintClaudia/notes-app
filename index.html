<style>
  html, body{margin:0;padding:0;background:#1e1e1e;height:100%;}
  :root{
    --bg:#1e1e1e;
    --panel:#252526;
    --panel-alt:#2d2d2d;
    --border:#3c3c3c;
    --text:#d4d4d4;
    --muted:#8a8a8a;
    --accent:#528bff;
    --accent-dim:#3a5f9e;
    --danger:#e06c75;
    --mono:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  #app-root{
    font-family:var(--mono);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    width:100%;
    font-size:13.5px;
    line-height:1.55;
  }
  .shell{max-width:460px;margin:0 auto;min-height:100vh;position:relative;
    display:flex;flex-direction:column;background:var(--bg);}
  .screen{flex:1;padding:18px 16px 90px;overflow-y:auto;}
  .topbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;min-height:24px;}
  .brand{display:flex;align-items:center;gap:8px;color:var(--text);font-size:13px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .topbar-actions{margin-left:auto;display:flex;gap:4px;}
  .icon-btn-plain{
    background:none;border:none;color:var(--text);cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:4px;
    border-radius:4px;
  }
  .icon-btn-plain:hover{color:var(--accent);}
  .icon-btn-plain svg{width:18px;height:18px;}

  .panel{
    background:var(--panel);border:1px solid var(--border);
    border-radius:6px;padding:14px;margin-bottom:12px;
  }
  .panel-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .panel-title h2{font-size:11px;font-weight:600;margin:0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

  button{
    font-family:var(--mono);font-size:12px;cursor:pointer;
    background:var(--panel-alt);color:var(--text);
    border:1px solid var(--border);border-radius:5px;
    padding:6px 10px;transition:border-color .12s, color .12s;
  }
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.primary{background:var(--accent-dim);border-color:var(--accent);color:#fff;}
  button.primary:hover{background:var(--accent);color:#fff;}
  button:disabled{opacity:.45;cursor:default;}

  input[type=text]{
    font-family:var(--mono);font-size:14px;font-weight:600;
    background:transparent;color:var(--text);
    border:none;border-bottom:1px solid transparent;
    padding:2px 0;width:100%;outline:none;
  }
  input[type=text]:focus{border-bottom-color:var(--accent);}
  input[type=text]::placeholder{color:#5a5a5a;font-weight:600;}

  .search-box{
    display:flex;align-items:center;gap:6px;background:var(--panel);
    border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-bottom:14px;
  }
  .search-box svg{width:15px;height:15px;color:var(--muted);flex-shrink:0;}
  .search-box input{font-size:13px;font-weight:400;color:var(--text);}
  .search-box input::placeholder{font-weight:400;color:#5a5a5a;}

  .stat-row{display:flex;gap:8px;margin-bottom:8px;}
  .stat{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;flex:1;}
  .stat .num{font-size:20px;color:var(--accent);font-weight:600;}
  .stat .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

  .cat-breakdown{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .cat-chip{
    font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:12px;
    padding:4px 10px;color:var(--text);
  }
  .cat-chip b{color:var(--accent);font-weight:600;}

  .summary-box{
    background:var(--bg);border:1px solid var(--border);border-radius:6px;
    padding:11px;margin-top:2px;color:var(--text);font-size:12.5px;
    white-space:pre-wrap;line-height:1.6;
  }
  .summary-box.placeholder{color:var(--muted);}

  .empty-msg{color:var(--muted);font-size:12px;padding:6px 2px;}

  .note-card{
    background:var(--panel);border:1px solid var(--border);border-radius:6px;
    padding:12px 13px;margin-bottom:10px;cursor:pointer;transition:border-color .12s;
  }
  .note-card:hover{border-color:var(--accent);}
  .note-card .title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .note-card .snippet{font-size:12px;color:var(--muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .note-card .meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:6px;}
  .note-card .meta{font-size:10.5px;color:#666;display:flex;align-items:center;gap:6px;}
  .note-card .badge{font-size:10px;color:var(--accent);border:1px solid var(--accent-dim);
    border-radius:10px;padding:1px 7px;flex-shrink:0;}
  .note-card .cat-tag{font-size:9.5px;color:var(--muted);border:1px solid var(--border);
    border-radius:10px;padding:1px 7px;}

  .fab{
    position:fixed;left:50%;transform:translateX(-50%);bottom:74px;
    max-width:460px;width:100%;pointer-events:none;
    display:flex;justify-content:flex-end;padding:0 16px;
  }
  .fab button{
    pointer-events:all;width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--accent);border:none;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4);
  }
  .fab button svg{width:20px;height:20px;}

  .bottom-nav{
    position:sticky;bottom:0;left:0;right:0;
    background:var(--panel);border-top:1px solid var(--border);
    display:flex;
  }
  .nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:9px 0 8px;cursor:pointer;color:var(--muted);
  }
  .nav-item svg{width:20px;height:20px;}
  .nav-item .nav-label{font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;}
  .nav-item.active{color:#fff;}

  .nav-create-btn{
    width:34px;height:34px;border-radius:10px;
    background:var(--panel-alt);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);cursor:pointer;
    transition:background .12s, color .12s, border-color .12s;
  }
  .nav-create-btn svg{width:17px;height:17px;}
  .nav-create-btn:hover, .nav-create-btn:active{
    background:#fff;border-color:#fff;color:#111;
  }

  /* category chips in editor */
  .cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .cat-pick{
    font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;
    border:1px solid var(--border);color:var(--muted);background:transparent;
  }
  .cat-pick:hover{border-color:var(--accent);color:var(--accent);}
  .cat-pick.selected{background:var(--accent-dim);border-color:var(--accent);color:#fff;}
  .cat-pick.add{border-style:dashed;}
  .cat-new-input{
    font-size:11px;padding:4px 8px;border-radius:12px;border:1px solid var(--accent);
    background:var(--bg);color:var(--text);width:110px;outline:none;
  }

  /* editor */
  .editor-wrap{display:flex;flex-direction:column;height:100%;}
  .editor-topbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .editor-title-input{flex:1;}
  .block-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0;
    transition:opacity .22s, transform .22s;}
  .block-row.leaving{opacity:0;transform:translateX(8px);}
  .block-check{
    flex-shrink:0;width:19px;height:19px;border-radius:50%;
    border:1.5px solid var(--muted);margin-top:3px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .12s, background .12s;
  }
  .block-check:hover{border-color:var(--accent);}
  .block-check.checked{background:var(--accent);border-color:var(--accent);}
  .block-check svg{width:11px;height:11px;color:#fff;opacity:0;transition:opacity .12s;}
  .block-check.checked svg{opacity:1;}
  .block-text{
    flex:1;font-family:var(--mono);font-size:13.5px;color:var(--text);
    background:transparent;border:none;outline:none;resize:none;
    padding:1px 0;overflow:hidden;line-height:1.55;
  }
  .block-text::placeholder{color:#5a5a5a;}
  .editor-hint{color:#5a5a5a;font-size:10.5px;margin:10px 0 4px;}
  .compose-bar{
    position:sticky;bottom:0;background:var(--bg);padding:10px 0 6px;
    display:flex;gap:8px;align-items:flex-end;
  }
  .compose-textarea{
    flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:9px 11px;font-family:var(--mono);font-size:13px;color:var(--text);
    resize:none;outline:none;max-height:140px;overflow-y:auto;line-height:1.5;
  }
  .compose-textarea::placeholder{color:#5a5a5a;}
  .compose-textarea:focus{border-color:var(--accent);}
  .compose-actions{display:flex;gap:6px;flex-shrink:0;}
  .mic-btn, .send-btn{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--border);background:var(--panel-alt);color:var(--text);cursor:pointer;
  }
  .mic-btn svg, .send-btn svg{width:16px;height:16px;}
  .mic-btn:hover{border-color:var(--accent);color:var(--accent);}
  .mic-btn:disabled{opacity:.35;cursor:default;}
  .mic-btn:disabled:hover{border-color:var(--border);color:var(--text);}
  .mic-btn.listening{background:var(--danger);border-color:var(--danger);color:#fff;animation:mic-pulse 1.2s ease-in-out infinite;}
  .send-btn{background:var(--accent-dim);border-color:var(--accent);color:#fff;}
  .send-btn:hover{background:var(--accent);color:#fff;}
  .send-btn:disabled{opacity:.35;cursor:default;background:var(--panel-alt);border-color:var(--border);color:var(--text);}
  @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,108,117,.45);}50%{box-shadow:0 0 0 7px rgba(224,108,117,0);}}
  .archive-banner{
    font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--border);
    border-radius:6px;padding:8px 10px;margin-bottom:12px;
  }
  .cursor-blink{display:inline-block;width:6px;height:12px;background:var(--accent);
    animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}
  @keyframes blink{50%{opacity:0;}}
</style>
<div id="app-root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useLayoutEffect} = React;

const DEFAULT_CATEGORIES = ['Work','Tasks','Ideas','Lists'];

// Works inside Claude.ai (uses window.storage) and also when hosted standalone
// (falls back to the browser's localStorage) so the same file runs either place.
const storageAdapter = {
  async get(key){
    if(typeof window.storage !== 'undefined'){
      return window.storage.get(key, false);
    }
    try{
      const v = localStorage.getItem('notesapp_'+key);
      return v===null ? null : {key, value:v};
    }catch(e){ return null; }
  },
  async set(key, value){
    if(typeof window.storage !== 'undefined'){
      return window.storage.set(key, value, false);
    }
    try{
      localStorage.setItem('notesapp_'+key, value);
      return {key, value};
    }catch(e){ return null; }
  }
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function newBlock(type='text', text=''){return {id:uid(), type, text};}
function newNote(){return {id:uid(), title:'', category:'', archived:false, blocks:[], updatedAt:Date.now()};}

function isNoteEmpty(n){
  if(n.title && n.title.trim()) return false;
  return !n.blocks.some(b=>b.text && b.text.trim());
}

function noteSnippet(n){
  const parts = n.blocks.filter(b=>b.text && b.text.trim()).map(b=> (b.type==='check' ? '○ ' : '') + b.text.trim());
  return parts.join('  ·  ') || 'Empty note';
}

function noteActiveCount(n){
  return n.blocks.filter(b=>b.type==='check' && b.text && b.text.trim()).length;
}

function noteMatchesSearch(n, q){
  if(!q) return true;
  const hay = (n.title + ' ' + n.category + ' ' + n.blocks.map(b=>b.text).join(' ')).toLowerCase();
  return hay.includes(q.toLowerCase());
}

/* ---------- icons ---------- */
const Icon = {
  grid: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>,
  plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg>,
  back: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
  trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  archive: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><line x1="10" y1="12" x2="14" y2="12"/></svg>,
  restore: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>,
  search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  mic: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>,
  send: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg>,
};

function autoGrow(el){
  if(!el) return;
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

/* ---------- App ---------- */
function App(){
  const [tab, setTab] = useState('dashboard'); // dashboard | notes
  const [notes, setNotes] = useState(null);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [editingId, setEditingId] = useState(null);
  const [viewingArchive, setViewingArchive] = useState(false);
  const [storageOk, setStorageOk] = useState(true);
  const [summary, setSummary] = useState('');
  const [summaryLoading, setSummaryLoading] = useState(false);
  const [summaryErr, setSummaryErr] = useState('');
  const summaryTimer = useRef(null);

  useEffect(()=>{
    (async ()=>{
      try{
        const r = await storageAdapter.get('notes_v2');
        setNotes(r ? JSON.parse(r.value) : []);
      }catch(e){ setNotes([]); }
      try{
        const c = await storageAdapter.get('categories_v1');
        setCategories(c ? JSON.parse(c.value) : DEFAULT_CATEGORIES);
      }catch(e){ setCategories(DEFAULT_CATEGORIES); }
    })();
  },[]);

  const persist = useCallback(async (next)=>{
    setNotes(next);
    try{
      const r = await storageAdapter.set('notes_v2', JSON.stringify(next));
      if(!r) setStorageOk(false);
    }catch(e){ setStorageOk(false); }
  },[]);

  const persistCategories = useCallback(async (next)=>{
    setCategories(next);
    try{ await storageAdapter.set('categories_v1', JSON.stringify(next)); }catch(e){}
  },[]);

  const generateSummary = useCallback(async (currentNotes)=>{
    setSummaryLoading(true);
    setSummaryErr('');
    try{
      const body = currentNotes.filter(n=>!n.archived && !isNoteEmpty(n)).map(n=>{
        const lines = n.blocks.filter(b=>b.text && b.text.trim()).map(b=> (b.type==='check' ? '[ ] ' : '') + b.text.trim());
        return `Note "${n.title || 'Untitled'}"${n.category ? ' (category: '+n.category+')' : ''}:\n${lines.join('\n')}`;
      }).join('\n\n');

      const prompt = `You are summarizing a personal notes app for the user's dashboard. Notes can mix plain text with checklist items (marked "[ ] "). Checklist items shown here are still active/pending — anything checked off has already been removed from the data. Notes may have a category.

NOTES:
${body || '(no notes yet)'}

Write a short, plain, useful summary (4-8 lines max) of what's still active/pending, grouped by category where it makes sense. No markdown headers, no fluff. If there's nothing, say so briefly.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{role:"user", content: prompt}]
        })
      });
      const data = await response.json();
      const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
      setSummary(text || 'No summary returned.');
    }catch(e){
      setSummaryErr('Could not generate summary right now.');
    }finally{
      setSummaryLoading(false);
    }
  },[]);

  // auto-generate summary on load and whenever notes change (debounced)
  useEffect(()=>{
    if(notes===null) return;
    if(summaryTimer.current) clearTimeout(summaryTimer.current);
    summaryTimer.current = setTimeout(()=>{ generateSummary(notes); }, 1200);
    return ()=>{ if(summaryTimer.current) clearTimeout(summaryTimer.current); };
    // eslint-disable-next-line
  },[notes]);

  if(notes===null){
    return <div style={{padding:'40px', color:'var(--muted)'}}>loading<span className="cursor-blink"></span></div>;
  }

  function openNewNote(){
    const n = newNote();
    persist([n, ...notes]);
    setEditingId(n.id);
  }

  function openNote(id){
    setEditingId(id);
  }

  function closeEditor(){
    const current = notes.find(n=>n.id===editingId);
    if(current && isNoteEmpty(current)){
      persist(notes.filter(n=>n.id!==editingId));
    }
    setEditingId(null);
  }

  function updateNote(id, patch){
    persist(notes.map(n=>n.id===id ? {...n, ...patch, updatedAt:Date.now()} : n));
  }

  function archiveNote(id){
    updateNote(id, {archived:true});
    setEditingId(null);
  }

  function restoreNote(id){
    updateNote(id, {archived:false});
    setEditingId(null);
  }

  function deleteForever(id){
    persist(notes.filter(n=>n.id!==id));
    setEditingId(null);
  }

  function addCategory(name){
    const clean = name.trim();
    if(!clean || categories.includes(clean)) return clean;
    persistCategories([...categories, clean]);
    return clean;
  }

  const editingNote = editingId ? notes.find(n=>n.id===editingId) : null;

  return (
    <div className="shell">
      <div className="screen">
        {editingNote ? (
          <Editor note={editingNote} categories={categories}
            onChange={patch=>updateNote(editingNote.id, patch)}
            onAddCategory={addCategory}
            onBack={closeEditor}
            onArchive={()=>archiveNote(editingNote.id)}
            onRestore={()=>restoreNote(editingNote.id)}
            onDeleteForever={()=>deleteForever(editingNote.id)} />
        ) : viewingArchive ? (
          <ArchiveList notes={notes} onOpenNote={openNote} onBack={()=>setViewingArchive(false)} />
        ) : tab==='dashboard' ? (
          <Dashboard notes={notes} categories={categories} storageOk={storageOk}
            summary={summary} summaryLoading={summaryLoading} summaryErr={summaryErr}
            onOpenNote={openNote} />
        ) : (
          <NotesList notes={notes} onOpenNote={openNote} onOpenArchive={()=>setViewingArchive(true)} />
        )}
      </div>

      {!editingNote && !viewingArchive && (
        <div className="bottom-nav">
          <div className={"nav-item"+(tab==='dashboard'?' active':'')} onClick={()=>setTab('dashboard')}>
            {Icon.grid}<span className="nav-label">dashboard</span>
          </div>
          <div className="nav-item" onClick={openNewNote}>
            <button className="nav-create-btn">{Icon.plus}</button>
          </div>
          <div className={"nav-item"+(tab==='notes'?' active':'')} onClick={()=>setTab('notes')}>
            {Icon.list}<span className="nav-label">notes</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Dashboard ---------- */
function Dashboard({notes, categories, storageOk, summary, summaryLoading, summaryErr, onOpenNote}){
  const realNotes = notes.filter(n=>!n.archived && !isNoteEmpty(n));

  const breakdown = categories.map(cat=>({
    cat, count: realNotes.filter(n=>n.category===cat).reduce((a,n)=>a+noteActiveCount(n),0)
  })).filter(b=>b.count>0);

  return (
    <div>
      <div className="topbar">
        <div className="brand"><span className="dot"></span>notes</div>
      </div>
      {!storageOk && <div className="empty-msg" style={{color:'var(--danger)'}}>storage error — changes may not save</div>}

      {breakdown.length>0 ? (
        <div className="cat-breakdown">
          {breakdown.map(b=>(
            <div className="cat-chip" key={b.cat}><b>{b.count}</b> {b.cat}</div>
          ))}
        </div>
      ) : (
        <div className="empty-msg">No tagged active tasks yet.</div>
      )}

      <div className="panel">
        <div className="panel-title"><h2>ai summary</h2></div>
        {summaryErr ? (
          <div className="summary-box" style={{color:'var(--danger)'}}>{summaryErr}</div>
        ) : (
          <div className={"summary-box"+(!summary && !summaryLoading?' placeholder':'')}>
            {summaryLoading ? <span>updating summary<span className="cursor-blink"></span></span> : (summary || 'Nothing to summarize yet — add a note to get started.')}
          </div>
        )}
      </div>

      <div className="panel">
        <div className="panel-title"><h2>recent</h2></div>
        {realNotes.length===0 && <div className="empty-msg">No notes yet — tap + to start one.</div>}
        {realNotes.sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,5).map(n=>(
          <div className="note-card" key={n.id} onClick={()=>onOpenNote(n.id)} style={{marginBottom:8}}>
            <div className="title">{n.title || 'Untitled'}</div>
            <div className="snippet">{noteSnippet(n)}</div>
            <div className="meta-row">
              <span className="meta">{n.category && <span className="cat-tag">{n.category}</span>}</span>
              {noteActiveCount(n)>0 && <span className="badge">{noteActiveCount(n)} active</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Notes list ---------- */
function NotesList({notes, onOpenNote, onOpenArchive}){
  const [q, setQ] = useState('');
  const realNotes = notes.filter(n=>!n.archived && !isNoteEmpty(n) && noteMatchesSearch(n,q)).sort((a,b)=>b.updatedAt-a.updatedAt);
  return (
    <div>
      <div className="topbar">
        <div className="brand"><span className="dot"></span>notes</div>
        <div className="topbar-actions">
          <button className="icon-btn-plain" onClick={onOpenArchive} title="archive">{Icon.archive}</button>
        </div>
      </div>

      <div className="search-box">
        {Icon.search}
        <input type="text" placeholder="Search notes..." value={q} onChange={e=>setQ(e.target.value)} />
      </div>

      {realNotes.length===0 && <div className="empty-msg">{q ? 'No matches.' : 'No notes yet.'}</div>}
      {realNotes.map(n=>(
        <div className="note-card" key={n.id} onClick={()=>onOpenNote(n.id)}>
          <div className="title">{n.title || 'Untitled'}</div>
          <div className="snippet">{noteSnippet(n)}</div>
          <div className="meta-row">
            <span className="meta">
              {new Date(n.updatedAt).toLocaleDateString()}
              {n.category && <span className="cat-tag">{n.category}</span>}
            </span>
            {noteActiveCount(n)>0 && <span className="badge">{noteActiveCount(n)} active</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Archive list ---------- */
function ArchiveList({notes, onOpenNote, onBack}){
  const archived = notes.filter(n=>n.archived).sort((a,b)=>b.updatedAt-a.updatedAt);
  return (
    <div>
      <div className="topbar">
        <button className="icon-btn-plain" onClick={onBack}>{Icon.back}</button>
        <div className="brand">archive</div>
      </div>
      {archived.length===0 && <div className="empty-msg">Archive is empty.</div>}
      {archived.map(n=>(
        <div className="note-card" key={n.id} onClick={()=>onOpenNote(n.id)}>
          <div className="title">{n.title || 'Untitled'}</div>
          <div className="snippet">{noteSnippet(n)}</div>
          <div className="meta-row">
            <span className="meta">{new Date(n.updatedAt).toLocaleDateString()}{n.category && <span className="cat-tag">{n.category}</span>}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Category picker ---------- */
function CategoryPicker({categories, value, onSelect, onAddCategory}){
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState('');
  const inputRef = useRef(null);

  useEffect(()=>{ if(adding && inputRef.current) inputRef.current.focus(); },[adding]);

  function submit(){
    const name = onAddCategory(draft);
    if(name) onSelect(value===name ? '' : name);
    setDraft('');
    setAdding(false);
  }

  return (
    <div className="cat-row">
      {categories.map(c=>(
        <div key={c} className={"cat-pick"+(value===c?' selected':'')}
          onClick={()=>onSelect(value===c ? '' : c)}>{c}</div>
      ))}
      {adding ? (
        <input ref={inputRef} className="cat-new-input" placeholder="Category name" value={draft}
          onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter') submit(); if(e.key==='Escape'){setAdding(false); setDraft('');} }}
          onBlur={submit} />
      ) : (
        <div className="cat-pick add" onClick={()=>setAdding(true)}>+ new</div>
      )}
    </div>
  );
}

/* ---------- Editor ---------- */
function Editor({note, categories, onChange, onAddCategory, onBack, onArchive, onRestore, onDeleteForever}){
  const [blocks, setBlocks] = useState(note.blocks);
  const [title, setTitle] = useState(note.title);
  const [category, setCategory] = useState(note.category || '');
  const [leaving, setLeaving] = useState({});
  const [focusTarget, setFocusTarget] = useState(null);
  const [composeText, setComposeText] = useState('');
  const [isListening, setIsListening] = useState(false);
  const refs = useRef({});
  const composeRef = useRef(null);
  const recognitionRef = useRef(null);

  const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micSupported = !!SpeechRecognitionCtor;

  useEffect(()=>{ onChange({title, blocks, category}); /* eslint-disable-next-line */ },[title, blocks, category]);

  useLayoutEffect(()=>{
    Object.values(refs.current).forEach(autoGrow);
  },[blocks]);

  useLayoutEffect(()=>{ autoGrow(composeRef.current); },[composeText]);

  useEffect(()=>{
    if(focusTarget && refs.current[focusTarget.id]){
      const el = refs.current[focusTarget.id];
      el.focus();
      const pos = focusTarget.pos ?? el.value.length;
      try{ el.setSelectionRange(pos,pos); }catch(e){}
      setFocusTarget(null);
    }
  },[focusTarget, blocks]);

  useEffect(()=>{
    return ()=>{ if(recognitionRef.current){ try{ recognitionRef.current.stop(); }catch(e){} } };
  },[]);

  function setBlockText(id, text){
    setBlocks(prev=>prev.map(b=>{
      if(b.id!==id) return b;
      if(b.type==='text' && text.startsWith('- ')){
        return {...b, type:'check', text: text.slice(2)};
      }
      return {...b, text};
    }));
  }

  function completeBlock(id){
    setLeaving(prev=>({...prev, [id]:true}));
    setTimeout(()=>{
      setBlocks(prev=>prev.filter(b=>b.id!==id));
      setLeaving(prev=>{const p={...prev}; delete p[id]; return p;});
    }, 220);
  }

  // Enter within an existing block just inserts a newline (default behavior).
  // Backspace at the very start of an empty block merges it into the previous one.
  function handleBlockKeyDown(e, block, index){
    if(e.key==='Backspace'){
      const el = e.target;
      if(el.selectionStart===0 && el.selectionEnd===0 && block.text===''){
        if(index===0) return;
        e.preventDefault();
        setBlocks(prev=>{
          const prevBlock = prev[index-1];
          const merged = {...prevBlock};
          const next = [...prev];
          next.splice(index,1);
          setFocusTarget({id:prevBlock.id, pos:prevBlock.text.length});
          return next;
        });
      }
    }
  }

  function handleSend(){
    const lines = composeText.split('\n');
    const additions = [];
    lines.forEach(line=>{
      if(line.trim()==='') return;
      const trimmedStart = line.replace(/^\s+/, '');
      if(trimmedStart.startsWith('- ')){
        additions.push(newBlock('check', trimmedStart.slice(2)));
      } else {
        additions.push(newBlock('text', line));
      }
    });
    if(additions.length===0) return;
    setBlocks(prev=>[...prev, ...additions]);
    setComposeText('');
    requestAnimationFrame(()=>{
      if(composeRef.current){ composeRef.current.style.height='auto'; composeRef.current.focus(); }
    });
  }

  function toggleMic(){
    if(!micSupported) return;
    if(isListening){
      if(recognitionRef.current) recognitionRef.current.stop();
      return;
    }
    const recog = new SpeechRecognitionCtor();
    recog.continuous = true;
    recog.interimResults = false;
    recog.lang = navigator.language || 'en-US';
    recog.onresult = (e)=>{
      let finalText = '';
      for(let i=e.resultIndex; i<e.results.length; i++){
        if(e.results[i].isFinal) finalText += e.results[i][0].transcript;
      }
      if(finalText.trim()){
        setComposeText(prev => prev ? prev + ' ' + finalText.trim() : finalText.trim());
      }
    };
    recog.onerror = ()=>{ setIsListening(false); };
    recog.onend = ()=>{ setIsListening(false); };
    recognitionRef.current = recog;
    recog.start();
    setIsListening(true);
  }

  return (
    <div className="editor-wrap">
      <div className="editor-topbar">
        <button className="icon-btn-plain" onClick={onBack}>{Icon.back}</button>
        <input type="text" className="editor-title-input" placeholder="Untitled"
          value={title} onChange={e=>setTitle(e.target.value)} />
        {note.archived ? (
          <>
            <button className="icon-btn-plain" onClick={onRestore} title="restore">{Icon.restore}</button>
            <button className="icon-btn-plain" onClick={onDeleteForever} title="delete forever">{Icon.trash}</button>
          </>
        ) : (
          <button className="icon-btn-plain" onClick={onArchive} title="archive">{Icon.archive}</button>
        )}
      </div>

      {note.archived && <div className="archive-banner">This note is archived. Restore it to keep editing, or delete it for good.</div>}

      <CategoryPicker categories={categories} value={category} onSelect={setCategory} onAddCategory={onAddCategory} />

      {blocks.length===0 && <div className="empty-msg">Nothing here yet — say or type something below.</div>}

      {blocks.map((block, i)=>(
        <div className={"block-row"+(leaving[block.id]?' leaving':'')} key={block.id}>
          {block.type==='check' ? (
            <div className={"block-check"+(leaving[block.id]?' checked':'')} onClick={()=>completeBlock(block.id)}>
              {Icon.check}
            </div>
          ) : (
            <div style={{width:19,flexShrink:0,marginTop:3}}></div>
          )}
          <textarea
            ref={el=>{ if(el){ refs.current[block.id]=el; } else { delete refs.current[block.id]; } }}
            className="block-text"
            rows={1}
            value={block.text}
            onChange={e=>{ setBlockText(block.id, e.target.value); autoGrow(e.target); }}
            onKeyDown={e=>handleBlockKeyDown(e, block, i)}
          />
        </div>
      ))}

      <div className="editor-hint">tip: start a line with "- " for a tap-to-complete item · hit enter to add a line, tap the arrow to save it</div>

      <div className="compose-bar">
        <textarea
          ref={composeRef}
          className="compose-textarea"
          rows={1}
          placeholder='Type a note, or "- " for a checklist item...'
          value={composeText}
          onChange={e=>{ setComposeText(e.target.value); autoGrow(e.target); }}
        />
        <div className="compose-actions">
          <button className={"mic-btn"+(isListening?' listening':'')} onClick={toggleMic}
            disabled={!micSupported} title={micSupported ? (isListening ? 'stop dictation' : 'dictate') : 'voice input not supported in this browser'}>
            {Icon.mic}
          </button>
          <button className="send-btn" onClick={handleSend} disabled={composeText.trim()===''} title="save">
            {Icon.send}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
